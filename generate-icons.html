<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Click buttons to download icons, then place them in the distributor-app folder.</p>
<button onclick="gen(192)">Download icon-192.png</button>
<button onclick="gen(512)">Download icon-512.png</button>
<script>
function gen(size) {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    // Background
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#f97316');
    grad.addColorStop(1, '#ea580c');
    ctx.fillStyle = grad;
    const r = size * 0.18;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();
    // Letter D
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${size * 0.55}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('D', size / 2, size / 2 + size * 0.04);
    // Download
    const a = document.createElement('a');
    a.download = `icon-${size}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
}
</script>
</body>
</html>
