<script>
// ── Test harness ──────────────────────────────────────────────────────────────
const allSections = [];
let totalPass = 0, totalFail = 0, totalSkip = 0;

function section(name, fn) {
  allSections.push({ name, fn });
}

async function runSection(s) {
  const results = [];
  const ctx = {
    pass: 0, fail: 0, skip: 0,
    test(name, fn) {
      try {
        const ret = fn();
        if (ret === 'SKIP') { this.skip++; results.push({ name, status: 'skip', detail: 'Skipped' }); return; }
        this.pass++;
        results.push({ name, status: 'pass', detail: '' });
      } catch (e) {
        this.fail++;
        results.push({ name, status: 'fail', error: e.message });
      }
    },
    async asyncTest(name, fn) {
      try {
        await fn();
        this.pass++;
        results.push({ name, status: 'pass', detail: '' });
      } catch (e) {
        this.fail++;
        results.push({ name, status: 'fail', error: e.message });
      }
    },
    assert(cond, msg) {
      if (!cond) throw new Error(msg || 'Assertion failed');
    },
    assertEqual(a, b, msg) {
      if (a !== b) throw new Error((msg || 'Expected equal') + ` — got: ${JSON.stringify(a)} vs ${JSON.stringify(b)}`);
    },
    assertContains(str, sub, msg) {
      if (!String(str).includes(sub)) throw new Error((msg || `Expected to contain "${sub}"`) + ` — got: ${str}`);
    },
    assertDefined(val, name) {
      if (val === undefined || val === null) throw new Error(`${name || 'value'} is not defined`);
    }
  };
  await s.fn(ctx);
  return { name: s.name, results, pass: ctx.pass, fail: ctx.fail, skip: ctx.skip };
}

function renderSectionHTML(sec) {
  const status = sec.fail > 0 ? 'fail' : (sec.skip === sec.results.length ? 'skip' : 'pass');
  const badgeCls = sec.fail > 0 ? 'badge-fail' : (sec.skip === sec.results.length ? '' : 'badge-pass');
  const badgeLabel = `${sec.pass}✓ ${sec.fail > 0 ? sec.fail + '✗ ' : ''}${sec.skip > 0 ? sec.skip + '— ' : ''}`;
  const icon = sec.fail > 0 ? '✗' : '✓';
  const iconColor = sec.fail > 0 ? '#f87171' : '#4ade80';

  const items = sec.results.map(r => {
    const cls = r.status === 'pass' ? 'pass' : r.status === 'fail' ? 'fail' : 'skip';
    const ico = r.status === 'pass' ? '✓' : r.status === 'fail' ? '✗' : '—';
    const icoColor = r.status === 'pass' ? '#4ade80' : r.status === 'fail' ? '#f87171' : '#94a3b8';
    const extra = r.error ? `<div class="error-detail">Error: ${escHtml(r.error)}</div>` :
                  r.detail ? `<div class="test-detail">${escHtml(r.detail)}</div>` : '';
    return `<li class="test-item ${cls}">
      <span class="icon" style="color:${icoColor}">${ico}</span>
      <div><div class="test-name">${escHtml(r.name)}</div>${extra}</div>
    </li>`;
  }).join('');

  return `<div class="section" id="sec-${slugify(sec.name)}">
    <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span><span style="color:${iconColor};margin-right:6px">${icon}</span>${escHtml(sec.name)}</span>
      <span class="section-badge ${badgeCls}">${badgeLabel}</span>
    </div>
    <div class="collapsible-body">
      <ul class="test-list">${items}</ul>
    </div>
  </div>`;
}

function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function slugify(s) { return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-'); }

async function runAllTests() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = 'Running…';
  totalPass = 0; totalFail = 0; totalSkip = 0;
  document.getElementById('results-area').innerHTML = '';
  document.getElementById('summary-bar').innerHTML = '';

  const progressFill = document.getElementById('progress-fill');
  const total = allSections.length;

  for (let i = 0; i < allSections.length; i++) {
    const s = allSections[i];
    document.getElementById('status-label').textContent = `Running: ${s.name} (${i+1}/${total})`;
    progressFill.style.width = `${Math.round((i / total) * 100)}%`;

    let secResult;
    try {
      secResult = await runSection(s);
    } catch (e) {
      secResult = { name: s.name, results: [{ name: 'Section crashed', status: 'fail', error: e.message }], pass: 0, fail: 1, skip: 0 };
    }

    totalPass += secResult.pass;
    totalFail += secResult.fail;
    totalSkip += secResult.skip;

    document.getElementById('results-area').insertAdjacentHTML('beforeend', renderSectionHTML(secResult));
    await new Promise(r => setTimeout(r, 10)); // let UI update
  }

  progressFill.style.width = '100%';
  renderSummary();
  btn.disabled = false;
  btn.textContent = 'Run Again';
  document.getElementById('status-label').textContent = `Done — ${totalPass} passed, ${totalFail} failed, ${totalSkip} skipped`;
  document.getElementById('test-time').textContent = `Completed at ${new Date().toLocaleTimeString()}  |  ${totalPass + totalFail + totalSkip} tests total`;
}

function renderSummary() {
  const pct = totalPass + totalFail > 0 ? Math.round(totalPass / (totalPass + totalFail) * 100) : 0;
  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-card"><div class="num green">${totalPass}</div><div class="lbl">PASSED</div></div>
    <div class="summary-card"><div class="num red">${totalFail}</div><div class="lbl">FAILED</div></div>
    <div class="summary-card"><div class="num yellow">${totalSkip}</div><div class="lbl">SKIPPED</div></div>
    <div class="summary-card"><div class="num blue">${pct}%</div><div class="lbl">PASS RATE</div></div>
  `;
}

// ── MODULE 1: Utility Functions ───────────────────────────────────────────────
section('Utility Functions — currency()', ({ test, assertEqual, assert, assertContains }) => {
  test('currency(0) returns "0.00"', () => assertEqual(currency(0), '0.00'));
  test('currency(null) returns "0.00"', () => assertEqual(currency(null), '0.00'));
  test('currency(undefined) returns "0.00"', () => assertEqual(currency(undefined), '0.00'));
  test('currency(1000) formats with Indian locale', () => assertContains(currency(1000), '1,000.00'));
  test('currency(100000) formats as 1,00,000.00', () => assertContains(currency(100000), '1,00,000.00'));
  test('currency(1.5) returns "1.50"', () => assertEqual(currency(1.5), '1.50'));
  test('currency(-500) returns negative', () => assertContains(currency(-500), '500.00'));
  test('currency("250") handles string input', () => assertContains(currency("250"), '250.00'));
});

section('Utility Functions — fmtDate()', ({ test, assert, assertEqual, assertContains }) => {
  test('fmtDate(null) returns "-"', () => assertEqual(fmtDate(null), '-'));
  test('fmtDate(undefined) returns "-"', () => assertEqual(fmtDate(undefined), '-'));
  test('fmtDate("") returns "-"', () => assertEqual(fmtDate(''), '-'));
  test('fmtDate("2024-01-15") returns readable date', () => assertContains(fmtDate('2024-01-15'), '2024'));
  test('fmtDate("2024-01-15") contains month', () => assertContains(fmtDate('2024-01-15'), 'Jan'));
  test('fmtDate("2024-12-31") contains Dec', () => assertContains(fmtDate('2024-12-31'), 'Dec'));
  test('fmtDate returns string type', () => assert(typeof fmtDate('2024-01-01') === 'string'));
});

section('Utility Functions — today()', ({ test, assert, assertContains }) => {
  test('today() returns a string', () => assert(typeof today() === 'string'));
  test('today() matches YYYY-MM-DD format', () => assert(/^\d{4}-\d{2}-\d{2}$/.test(today())));
  test('today() year is current year', () => assertContains(today(), String(new Date().getFullYear())));
  test('today() is consistent (same value on re-call)', () => assert(today() === today()));
});

section('Utility Functions — isSalesman() / isPacker() / canEdit()', ({ test, assert }) => {
  // Save original
  const origUser = window.currentUser;

  test('isSalesman() returns false when no user', () => {
    window.currentUser = null;
    assert(!isSalesman());
  });
  test('isSalesman() true for role=salesman', () => {
    window.currentUser = { role: 'Salesman' };
    assert(isSalesman());
  });
  test('isSalesman() false for role=admin', () => {
    window.currentUser = { role: 'Admin' };
    assert(!isSalesman());
  });
  test('isPacker() true for role=packing', () => {
    window.currentUser = { role: 'Packing' };
    assert(isPacker());
  });
  test('isPacker() true for role=packer', () => {
    window.currentUser = { role: 'packer' };
    assert(isPacker());
  });
  test('isPacker() false for role=admin', () => {
    window.currentUser = { role: 'Admin' };
    assert(!isPacker());
  });
  test('canEdit() true for role=admin', () => {
    window.currentUser = { role: 'Admin' };
    assert(canEdit());
  });
  test('canEdit() true for role=manager', () => {
    window.currentUser = { role: 'Manager' };
    assert(canEdit());
  });
  test('canEdit() false for role=salesman', () => {
    window.currentUser = { role: 'Salesman' };

// ── MODULE 3: DB — ls cache ───────────────────────────────────────────────────
section('DB Module — ls (cache layer)', ({ test, assert, assertEqual }) => {
  test('ls.get unknown key returns []', () => {
    const v = DB.ls.get('nonexistent_key_xyz');
    assert(Array.isArray(v));
  });
  test('ls.getObj unknown key returns {}', () => {
    const v = DB.ls.getObj('nonexistent_key_xyz');
    assert(typeof v === 'object' && !Array.isArray(v));
  });
  test('ls.set stores value in cache', () => {
    DB.ls.set('test_data', [{ id: 1 }]);
    assert(DB.cache['test_data'] !== undefined);
  });
  test('ls.get retrieves stored value', () => {
    DB.ls.set('test_data2', [{ id: 99 }]);
    const v = DB.ls.get('test_data2');
    assert(Array.isArray(v) && v[0].id === 99);
  });
  test('DB.cache is an object', () => assert(typeof DB.cache === 'object'));
});

// ── MODULE 4: ColumnManager ───────────────────────────────────────────────────
section('ColumnManager — Column Personalization', ({ test, assert, assertEqual }) => {
  const pages = ['inventory', 'parties', 'salesorders', 'purchaseorders', 'invoices', 'payments', 'expenses', 'packing', 'delivery'];

  pages.forEach(page => {
    test(`ColumnManager.PAGES["${page}"] is defined`, () => {
      if (!ColumnManager.PAGES[page]) throw new Error(`Missing page config for ${page}`);
    });
    test(`ColumnManager.get("${page}") returns array`, () => {
      const cols = ColumnManager.get(page);
      if (!Array.isArray(cols)) throw new Error('Expected array');
    });
    test(`ColumnManager.get("${page}") has required columns`, () => {
      const cols = ColumnManager.get(page);
      const hasRequired = cols.some(c => c.required);
      if (!hasRequired) throw new Error('No required columns found');
    });
  });

  test('ColumnManager.save() stores to localStorage', () => {
    const cols = ColumnManager.get('inventory');
    ColumnManager.save('inventory_test', cols);
    const raw = localStorage.getItem('colcfg_inventory_test');
    if (!raw) throw new Error('Nothing saved to localStorage');
  });

  test('ColumnManager.reset() removes from localStorage', () => {
    ColumnManager.save('inventory_test2', [{ key: 'x' }]);
    ColumnManager.reset('inventory_test2');
    const raw = localStorage.getItem('colcfg_inventory_test2');
    if (raw !== null) throw new Error('Item should have been removed');
  });
});

// ── MODULE 5: ROLE_PAGES & getUserPages ───────────────────────────────────────
section('Role & Permissions — ROLE_PAGES / getUserPages()', ({ test, assert, assertEqual }) => {
  test('ROLE_PAGES.Admin is defined', () => assert(Array.isArray(ROLE_PAGES.Admin)));
  test('ROLE_PAGES.Manager is defined', () => assert(Array.isArray(ROLE_PAGES.Manager)));
  test('ROLE_PAGES.Salesman is defined', () => assert(Array.isArray(ROLE_PAGES.Salesman)));
  test('ROLE_PAGES.Delivery is defined', () => assert(Array.isArray(ROLE_PAGES.Delivery)));
  test('ROLE_PAGES.Packing is defined', () => assert(Array.isArray(ROLE_PAGES.Packing)));
  test('Admin has access to dashboard', () => assert(ROLE_PAGES.Admin.includes('dashboard')));
  test('Admin has access to users', () => assert(ROLE_PAGES.Admin.includes('users')));
  test('Salesman does NOT have access to users', () => assert(!ROLE_PAGES.Salesman.includes('users')));
  test('Packing only has dashboard and packing', () => {
    const pages = ROLE_PAGES.Packing;
    if (pages.length !== 2) throw new Error(`Expected 2 pages, got ${pages.length}: ${pages}`);
  });
  test('getUserPages() returns array for Admin user', () => {
    const pages = getUserPages({ role: 'Admin', roles: ['Admin'] });
    assert(Array.isArray(pages) && pages.length > 0);
  });
  test('getUserPages() respects extra_perms', () => {
    const pages = getUserPages({ role: 'Salesman', roles: ['Salesman'], extra_perms: ['hrpayroll'] });
    assert(pages.includes('hrpayroll'));
  });
  test('getUserPages() deduplicates pages', () => {
    const pages = getUserPages({ role: 'Admin', roles: ['Admin', 'Manager'] });
    const uniq = [...new Set(pages)];
    assert(pages.length === uniq.length);
  });
  test('getUserPages() handles missing roles gracefully', () => {
    const pages = getUserPages({ role: 'Admin' });
    assert(Array.isArray(pages));
  });
});

// ── MODULE 19: today() consistency ───────────────────────────────────────────
section('Utility Functions — today() Correctness', ({ test, assert, assertContains }) => {
  test('today() does not have time component', () => {
    const t = today();
    if (t.includes('T')) throw new Error('today() should not include time: ' + t);
  });
  test('today() has valid month (01-12)', () => {
    const [, month] = today().split('-');
    const m = parseInt(month);
    if (m < 1 || m > 12) throw new Error(`Invalid month: ${month}`);
  });
  test('today() has valid day (01-31)', () => {
    const parts = today().split('-');
    const d = parseInt(parts[2]);
    if (d < 1 || d > 31) throw new Error(`Invalid day: ${parts[2]}`);
  });
});
